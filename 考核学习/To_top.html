<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-top</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        .nav {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }
        .content {
            height: 2000px;
            padding: 20px;
            background: #f0f0f0;
        }
        .scroll-to-top {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 1000;
        }
        .scroll-to-top:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <nav class="nav">第一个导航栏</nav>
    <div class="content">这是很长的内容</div>
    <button class="scroll-to-top">返回顶部</button>

    <script>
        const nav = document.querySelector('.nav');
        const toTopBtn = document.querySelector('.scroll-to-top');

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;

            if (scrollY > 50) {
                nav.style.position = 'fixed';
                nav.style.top = '0';
                nav.style.left = '0';
                nav.style.width = '100%';
            } else {
                nav.style.position = '';
            }

            if (scrollY > 300) {
                toTopBtn.style.display = 'block';
            } else {
                toTopBtn.style.display = 'none';
            }
        });

        toTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
