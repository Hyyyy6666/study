    <script>
        /* 
            使用{} 来创建代码块，代码块可以用来对代码进行分组
                同一个代码中的代码，就是同一组代码，一个代码块中的代码要吗都执行，要么都不执行
            
            let 和 var 
                -在js中，使用let声明的变量具有块作用域
                    在代码块声明的变量无法再代码块的外部访问

                -使用var声明的变量，不具有作用域
        */

        {
            let a = 10 
            var 吧= 10
        }

        //alert(a)//此时无法访问
        //alert（b）可以访问


        {
            console.log('嘻嘻')
            document.write('哈哈')

        }


    </script>
