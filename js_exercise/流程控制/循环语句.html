    <Script>
        /* 
            循环语句
                -通过循环语句可以使置顶的代码反复执行
                -JS中一共有三种循环语句
                    while语句
                    do-while语句
                    for语句
                -while语句
                    -语法：
                        while（条件表达式）{
                            语句...
                        }

                    -执行流程：
                        while语句在执行时，会先对条件表达式进行判断。
                            如果结果为true，则执行循环体，执行完毕，继续判断
                            直到结果表达式为false，循环结束

                    -当一个循环的条件表达式恒为true，这个循环就是一个死循环，会一直循环（慎用）
                    -编写要点
                        1.初始化表达式（初始化变量）
                        2.条件表达式（设置循环运行的条件）
                        3.更新表达式


                - do-while语句
                    -语法：
                        do{
                            语句...
                        }while(条件表达式)

                    -执行流程：
                        do-while语法在执行时，会先执行do后的循环体，
                            执行完毕后，会对while后的条件表达式进行判断
                            如果结果为false，循环终止
                            如果结果为true，则继续执行循环体，以此类推
                        和while区别
                            while先判断在执行
                            do-while先执行再判断

                            实质区别：
                                do-while语句可以确保循环至少执行一次

                -for语句
                    -语法：
                        for（1.初始化表达式;2.条件表达式;4.更新表达式）{
                            3.语句...
                        }
                    -执行流程：
                        1. 执行初始化表达式，初始化变量
                        2.执行条件表达式，判断循环是否执行（true执行，false终止）
                        3.判断结果为true，则执行循环体
                        4.执行更新表达式，对初始化变量进行修改
                        5.重复，直到判断为false为止

                    - 初始化表达式，在循环的整个声明周期中，只会执行一次
                    -for循环的三个表达式都可以省略
                    -使用let在for循环中声明的变量是局部变量，只能在for循环内部访问
                     只用var在for循环中声明的变量可以在for循环外访问
                    
                    - 创建死循环的方式：
                        while（1）{}
                        for（;;）{}

                -循环的嵌套
                    
        */
