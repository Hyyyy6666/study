    <script>
        /* 
            流程控制语句可以用来改变程序执行的顺序
                1.条件判断语句
                2.条件分支语句
                3.循环语句


            if语句
                - 语法：
                    if（条件表达式）{
                        语句...
                    }


                -执行流程
                    if局域在执行会对if后的条件表达式进行求值判断
                        如果结果为true，则执行if后的语句
                        如果为false则不执行

                    if语句只会控制紧随其后的那一行代码，如果希望控制多行代码，可以使用大括号将语句括起来

                    如果if后的表达式不是布尔值，会转换为布尔值然后再运算
        */

        /* 
            if-else语句
                -语法：
                    if（条件表达式）{
                        语句...
                    }else{
                        语句...
                    }


                -执行流程
                    if-else执行时，先对条件表达式进行求值判断，
                        如果结果为true，则执行if后的语句
                        如果结果为false，则执行else后的语句


                if-else if-else语句
                -语法：
                    if（条件表达式）{
                        语句...
                    }else if{
                        语句...
                    }else if{
                        语句...
                    }else if{
                        语句...
                    }else if{
                        语句...
                    }
                -执行流程：
                    会自上而下，依次对if后面的条件表达式进行求值判断
                        如果条件表达式结果为true，则执行当前if后的语句，执行完毕语句结束
                        如果条件表达式结果为false，则继续向西阿判断，知道找到true为止
                        如果所有的条件表达式都是false，则执行else后语句
                    

        */
         
        /* 
            switch语句
            -语法：
                switch(表达式){
                    case 表达式：
                        代码...
                        break
                    case 表达式：
                        代码...
                        break
                    case 表达式：
                        代码...
                        break
                    case 表达式：
                        代码...
                        break
                    default(都不满足时执行，作用类似else，位置不固定):
                        代码...
                }

            -执行流程
                switch语句在执行时，会依次将Switch后的表达式和case后的表单式进行全等（===）比较
                    如果比较结果为true，则自当前case处开始执行代码
                    如果比较结果为false，则继续比较其他case后的表达式，知道找到true为止

                
        
        */
