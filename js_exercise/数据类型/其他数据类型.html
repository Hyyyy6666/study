<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script>
    /* 
        布尔值（boolean）
            -布尔值主要用来进行逻辑判断
            -布尔值只有两个 true 和 false
            -使用typeof检查一个布尔值会返回 boolean



        空值（null）
            -空值用来表示空对象
            -空值只有一个 null
            -使用type检查一个空值会返回object，无法检查空值


        未定义（undefined）
            -当声明一个变量没有赋值时，他的值就是undefined
            -undefined只有一个值，就是 undefined
            -使用typeof检查时，会返回'undefined'


        符号（symbol）
            -用来创建一个唯一的标识
            -用typeof检查，返回一个symbol
    */


    let c = Symbol()//调用symbol创建了一个符号

    console.log(c)


    let bool = true
    bool = false

    let number = 1
    console.log(bool)
    console.log(number)


    </script>
</head>
