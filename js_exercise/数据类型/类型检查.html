<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let a =10;
        let b = 10n;

        console.log(a)
        console.log(b)

        /* 不同类型不能混合计算 ：a+b在此处就会报错*/

        /* 
            typeof 运算符（检查值的类型）
        */
        console.log(typeof a);// number
        console.log(typeof b);// bigint

    </script>
</head>

</body>
</html>
