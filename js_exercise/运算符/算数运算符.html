<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script>
        /* 
            运算符（操作符）
                -运算符可以用来对一个或多个操作数（值）进行运算
                -算数运算符：
                    + 加法运算符
                    - 减法运算符
                    * 乘法运算法
                    / 出发运算符（不是整除） 10 / 0 = Infinity
                    ** 幂运算 a = 10 ** 2   为10的二次方
                    % 取模   两数相除取余数

                -注意
                    -算术运算时，除了字符串的加法
                        其他运算的操作时非数值时，会转换为数值然后运算


            

        */



        a = 10 - '5'
        /* 
        js是一门弱类型语言，会自动惊醒类型转换
        */


        /* 
        当任意一个值和字符串做加法运算时，他会先将其他值转换为字符串
            然后再做拼串的操作
        可以利用这一特点完成类型转换
            可以通过任意类型 + 一个空串的形式来将其转换为字符串
                其原理和String（）函数相同，但使用更简洁
        */

        a = 'hello' + 'world'
        a = '1' + 2//"1" + "2",打印出来时12，为字符串类型

    </script>
</head>

</body>
</html>
