    <script>

        /* 
            只需要一个运算对象的就是一元运算符


            一元
                +正号
                    不会改变数值的符号

                -负号
                    可以对数值进行负号取反

                当对非数值类型进行正负运算，会将其转换为数值然后再运算
                    b = + b就是把字符b转换为数字，完成了数字的隐式类型转换

                ++ 自增运算符
                    -++使用后回事变量立刻增加1
                    - 无论是++a还是a++，都会是原来的变量立刻增加1
                    -不同的是返回值不一样
                        a++ 是自增前的值 旧值
                        ++a 是自增后的值 新值
        */
    </script>
