<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script>
        /* 
            ! 逻辑非
                - ！ 可以用来对一个值进行非运算
                - 它可以对一个布尔值进行去翻操作
                    true false
                    false true
                -如果对非布尔值取反，会先转换成布尔值再取反
                    可利用该特点，将其他类型转换为布尔值（取两次反）

            
            && 逻辑与
                - 可以对左右两个值进行与运算
                - 当与运算左右都为true时，会返回true，否则返回false
                - 与运算时短路的与，如果第一个值为false，则不看第二个值
                - 与运算是找false，如果找到则直接返回，没有才返回true
                - 对于非布尔值进行与运算，hi转换为布尔值然后计算，但最终会返回原值
                    -如果第一个值为false，则直接返回第一个值
                    -如果第一个值为true，则返回第二个值
            || 逻辑或
                -可以对左右两个值进行或运算
                -当||左右有true时，则返回true，否则返回false
                -或运算也是短路的或，如果第一个值为true，则不看第二个值
                -或运算是找true，如果找到则返回true，没有才返回false
                -对于非布尔值或运算，他会转换为布尔值然后运算，，但最终会返回原值
                    -如果第一个是true，则返回第一个值
                    -如果第一个是false，则返回第二个值



            -类型转换总结
                转换为字符串
                    显换转换
                        string（）
                    隐式转换
                        + “”

                转换为数值
                    显示转换
                        Number（）
                    隐式转换
                        +
                
                转换为布尔值
                    显式转换
                        Boolean（）
                    隐式转换
                        ！！
        */

    </script>
</head>
