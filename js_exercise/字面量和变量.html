    <title>字面量和变量</title>
    <script>
        /*
            字面量：
                -字面量其实就是一个值，他所代表的含义就是他的字面意思
                -比如：1 2 3 4 100 "hello" ture null……
                -所有字面量在js中都可以直接使

            变量：
                -可以用来"存储"字面量
                -并且变量中存储的字面量可以随意的修改
                -通过变量可以对字面量进行描述
        */  

        let x;
        x=80;
        x='哈哈'


        let age;
        age = 80;
        age =  81
        //consloe.log('age');
        //console.log(x);

        /* 
        1.多行注释：shift alt a
        2.单行注释：ctrl /

        变量使用

            -变量复制：2.变量名 = xx
            -同时进行：let i = 100(let 变量名 = 值)

        */

       let b,c,d;
