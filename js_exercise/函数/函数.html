<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>

        /* 
            函数（Function)
                -函数也是一个对象
                -它具有其他对象所有的功能
                -函数中可以储存代码，且可以在需要时调用这段代码
            语法：
                -function 函数名（）{
                    语句...
                }

                -函数调用：
                    -调用函数式时执行函数中储存的代码
                    -语法：
                        函数对象（）

                -使用typeof检查函数对象时，会返回function

            
            函数的定义方式
                -函数声明
                    function 函数名(){
                        语句...
                    }
                -函数表达式
                    const 变量 = function(){
                        语句...
                    }
                -箭头函数
                    const 函数名 = () => {
                        语句...
                    }

        */


        //创建一个函数对象
        function fn(){
            console.log("hello function")
            console.log("你好")
        }
        //调用函数
        fn()

        let result
        function fn2(a,b,c){
            result = a + b + c
            return result
        }
        result = fn2(10,20,30,40)
        console.log(result)

    </script>
</head>
<body>
    
</body>
</html>
