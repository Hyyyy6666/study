    <script>

        /* 
            函数（Function)
                -函数也是一个对象
                -它具有其他对象所有的功能
                -函数中可以储存代码，且可以在需要时调用这段代码
            语法：
                -function 函数名（）{
                    语句...
                }

                -函数调用：
                    -调用函数式时执行函数中储存的代码
                    -语法：
                        函数对象（）

                -使用typeof检查函数对象时，会返回function

            
            函数的定义方式
                -函数声明
                    function 函数名(){
                        语句...
                    }
                -函数表达式
                    const 变量 = function(){
                        语句...
                    }
                -箭头函数
                    const 函数名 = () => {
                        语句...
                    }

        */

/* 
        //创建一个函数对象
        function fn(){
            console.log("hello function")
            console.log("你好")
        }
        //调用函数
        fn()

        let result
        function fn2(a,b,c){
            result = a + b + c
            return result
        }
        result = fn2("hello",",","world")
        console.log(result)


        const fn3 = (a) => {
            console.log("a =",a)
            
        }

        fn3(100)
        //当且仅当传一个参数的时候可以省略括号（）


        //定义参数，可以为参数指定默认值
        //默认值会在没有对应实参时生效
        const fn4 = (a = 100) => {
            console.log(a)
        }
        fn4(1)






        function fn5(a) {
            a = {}//a指向了一个新的对象
            a.name = "猪八戒"//修改对象时，如果有其他变量指向该对象，则所有指向该对象的变量都会受到影响
            console.log(a)
        } 
        let obj = {name : "孙悟空"}

        fn5(obj)

        //传递实参时，传递并不是变量本身，而是变量中储存的值

        console.log(obj)
 
        //在函数外部定义对象，使用默认值时会指向同一个对象
        //在函数定义时定义对象，每一次函数调用都会创建一个新的对象




        //函数做参数

            在JS中，函数也是一个对象（一等函数）
                别的对象能做到的事情，函数也可以做到
