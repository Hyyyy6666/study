<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <Script>

        /* 
            函数的定义方式：
                1.函数声明式
                    function 函数名（）{
                        语句...
                    }

                2.函数表达式
                    const 变量 = function(){
                        语句...
                    }

                3.箭头函数
                    （） => {
                        语句...
                    }
        */

        function fn (){
            console.log("函数声明定义的函数")
        }//函数声明，不需要赋值

        const fn2 = function(){
            console.log("函数表达式")
        }            
        
        const fn3 = () =>{
            console.log("箭头函数")
        }

        const  fn4 = () => console.log("箭头函数简写")

        console.log(typeof fn)
         console.log(typeof fn2)
          console.log(typeof fn3)
           console.log(typeof fn4)

    </Script>
</head>
<body>
    
</body>
</html>
