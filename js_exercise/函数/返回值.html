    <script>
    /* 
        在函数中，可以通过return关键字来指定函数的返回值
            返回值就是函数的执行结果，函数调用完毕返回值便会作为结果返回

        任何值都可以作为返回值使用（包括对象和函数之类的值）
            如果函数中没有return语句，或者return后面没有跟任何值，则函数的返回值为undefined
            如果不写return，返回值仍是undefined

        return一执行，函数执行立即结束
    */

    /* 
        箭头函数的返回值可以直接写在箭头后
            如果直接在箭头后设置对象字面量为返回值时，对象字面量必须使用（）
            
    */
    
        const sum = (a,b) => a + b
        const fn = () => ({name:"孙悟空"})


    </script>
