<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        /* 
            作用域（Scope)
                -作用域指的是一个变量的可见区域
                -作用域有两种
                    -全局作用域
                        -全局作用域在网页运行时创建，网页关闭时销毁
                        -所有直接编写到script标签中的代码都位于全局作用域中
                        -全局作用域中的变量是全局变量，可以在任意位置访问
                    -局部作用域
                        -块作用域
                            -块作用域是一种局部作用域
                            -块作用域在代码执行时创建，代码块执行完毕它就销毁
                            -在块作用域中声明的变量是局部变量，只能在块内部访问，外部无法访问
                -函数作用域
                    -函数作用域也是一种局部作用域
                    -函数作用域在函数调用时产生，调用结束后销毁
                    -函数每次调用都会产生一个全新的函数作用域
        */
       
        /* 
            方法
                -当一个对象的属性指向一个函数
                    那我们就称这个函数是该对象的方法
                    调用函数就成为调用对象的方法
        */

        let a = 10
        {
            let a = "第一个代码块中的a"
            {
                console.log(a)//先找同级，同级无，遵循就近原则
            }
        }

        let b = 33
        
        function fn1(b){
            
            console.log(b)
        }
    

        let obj = {}
        obj.name = "孙悟空"
        obj.age = 100
        obj.sayhello = function(){
            alert("hello,world")
        }
        function fn3(){
            console.log(obj)
        }
        obj.sayhello()//方法
        String()//函数

    </script>
</head>

</html>
