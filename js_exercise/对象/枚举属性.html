<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script>
        /* 
            枚举属性：将对象中的所有属性全部获取

            for-in语句
                -语法
                    for(let propName in 对象){
                        语句...
                    }

                -for-in 循环体会执行多次，有几个属性就会执行几次
                    每次执行时，都会将一个属性名赋值给我们所定义的变量

                -注意：并不是所有的属性，都可以被枚举：比如使用符号添加的属性
        */  

        let obj = {

            name:"孙悟空",
            age:18,
            gender: 'male',
            address:'花果山',
            [Symbol()]:'测试的属性值'//符号添加的属性不可枚举
        }

        for(let propName in obj){

            console.log(propName,obj[propName])//此处要是用. 会发生报错
        }

    </script>
</head>
<body>
    
</body>
</html>
