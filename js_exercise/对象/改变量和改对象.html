<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script>
        let obj = {
            name:"孙悟空"
        }

        const  obj2 = obj//const示例

        //obj2.name = '猪八戒' 

        obj2 = null//给obj2重新赋值，指向的对象变了，不会再改变obj所指向的对象

              

        /* 
            let obj2 = obj
            obj2 = {}
            obj2.name = '猪八戒'        
        */
        console.log(obj)//"name 变成了猪八戒"
        console.log(obj2)



        /* 
        区分
            obj2.anme = "猪八戒"   修改对象
            obj2 = null    修改变量
        
            修改对象
                -修改对象时，如果有其他变量指向该对象
                    则所有指向该对象的变量都会受到影响
            
            修改变量
                -修改变量时，只会影响当前的变量

            在使用变量存储对象时，很容易因为改变变量指向的对象，提高代码复杂度
                所以通常情况下，声明存储对象的变量时会使用const
            
            注意
                const只是进制变量被重新赋值，对对象的修改没有任何影响
        */


    </script>
</head>
<body>
    
</body>
</html>
