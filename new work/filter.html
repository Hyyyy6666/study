<body>
    <script>
    const arr = [
    {name: "高数",done:true},
    {name:"英语",done:false},
    {name:"体育",done:true},
    {name:"语文",done:false}
    ]

    const notDone = arr.filter(function(item,arr){
        return !item.done
    })
    console.log(notDone)

    const done = arr.filter(item => item.done)
    console.log(done)
    </script>
