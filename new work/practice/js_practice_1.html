<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数组与对象练习1</title>
</head>
<body>
    <script>
/*
    练习1：数组操作（1小时）
目标：熟练使用 map、filter、find、forEach
任务：
有一个数组 nums = [3, 8, 12, 5, 9]，用 filter 挑出所有大于 6 的数。
用 map 把每个数乘以 2，生成新数组。
用 find 找出第一个大于 10 的数。
用 forEach 打印每个数的平方。
产出：在控制台看到正确结果。
*/
const nums = [3, 8, 12, 5, 9]
let newNum = nums.filter(t => t>6)

let squareNum = nums.map(t => t*t)

let foundNum = nums.find(t => t>10)

console.log(newNum)
console.log(squareNum)
console.log("The first num is " + foundNum)

nums.forEach( 
    t => console.log("this is the square of:" + t*t )
)






const products = [
    {name:"手机",price:2999},
    {name:"电脑",price:4999},
    {name:"耳机",price:199},
    {name:"键盘",price:499}
]

products.forEach(
    t => console.log("The name is: " + t.name)
)

let newPrice = products.map(m => m.price)

let foundPrice = products.find(t => t.price<1000)

let filterPrice = products.filter(t => t.price>500)

console.log("The price is: "+newPrice)
console.log("The found price is: "+foundPrice.price)
console.log("The filtered prices are: "+ filterPrice.map(t => t.price)  )

    </script>
    
</body>
</html>
